<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Bookings — IRCTC</title>
<link rel="stylesheet" href="shared.css">
<style>
.booking-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;transition:.2s}
.booking-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.bcard-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fafbff;border-bottom:1px solid var(--border)}
.bcard-body{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;padding:14px 16px;gap:8px}
.bcard-footer{display:flex;align-items:center;padding:10px 16px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
.bcard-action{background:#f1f5f9;border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans',sans-serif;transition:.15s}
.bcard-action:hover{background:var(--light);color:var(--blue)}
.bcard-action.danger:hover{background:#fee2e2;color:var(--red)}
.filter-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.ftab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans',sans-serif;color:var(--muted);transition:.15s}
.ftab.active{border-color:var(--blue);background:var(--light);color:var(--blue)}
.pnr-num{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--blue);background:var(--light);padding:3px 9px;border-radius:4px;letter-spacing:1px}
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="hero" style="padding-bottom:16px">
  <h1 class="hero-title">My Bookings</h1>
  <p class="hero-sub">View and manage all your train bookings in one place</p>
</div>

<div class="section">
  <div id="logged-out" class="hidden">
    <div style="background:#fff;border-radius:12px;border:1px solid var(--border);padding:3rem;text-align:center">
      <div style="font-size:56px;margin-bottom:16px">🔐</div>
      <div style="font-size:18px;font-weight:700;color:var(--dark);margin-bottom:6px">Please login to view your bookings</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1.5rem">Your upcoming and past journeys will appear here after login</div>
      <button class="btn-orange-full" style="max-width:200px;margin:0 auto" onclick="showLoginModal()">Login to IRCTC</button>
    </div>
  </div>

  <div id="logged-in">
    <!-- SUMMARY CARDS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem" id="summary-cards"></div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterBookings('all',this)">All Bookings</button>
      <button class="ftab" onclick="filterBookings('upcoming',this)">Upcoming</button>
      <button class="ftab" onclick="filterBookings('completed',this)">Completed</button>
      <button class="ftab" onclick="filterBookings('cancelled',this)">Cancelled</button>
    </div>

    <div id="bookings-list"></div>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="modals-placeholder"></div>

<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = navbar('');
document.getElementById('footer-placeholder').innerHTML = footer();
document.getElementById('modals-placeholder').innerHTML = bookingModal() + loginModal();

// Show logged-in view by default for demo
document.getElementById('logged-out').classList.add('hidden');
document.getElementById('logged-in').classList.remove('hidden');

// ---- SUMMARY CARDS ----
var summaryData = [
  {num:'3', label:'Total Bookings', color:'var(--blue)'},
  {num:'1', label:'Upcoming Journeys', color:'var(--green)'},
  {num:'2', label:'Completed Trips', color:'var(--muted)'},
  {num:'₹3,245', label:'Total Savings', color:'var(--orange)'},
];
var summaryDiv = document.getElementById('summary-cards');
summaryData.forEach(function(s) {
  var div = document.createElement('div');
  div.style.cssText = 'background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem;text-align:center';
  div.innerHTML = '<div style="font-family:\'Rajdhani\',sans-serif;font-size:28px;font-weight:700;color:' + s.color + '">' + s.num + '</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-top:4px;font-weight:600">' + s.label + '</div>';
  summaryDiv.appendChild(div);
});

// ---- BOOKING DATA ----
var allBookings = [
  {
    pnr:'5901234567', status:'upcoming', statusLabel:'Confirmed', statusColor:'var(--green)',
    train:'12301 Howrah Rajdhani Express', type:'Rajdhani',
    from:'CSTM', fromName:'Mumbai CST', to:'NDLS', toName:'New Delhi',
    dep:'16:35', arr:'10:05', date:'Apr 25, 2026', cls:'3A — Third AC',
    fare:'₹2,196', seats:'B3/22 LB', passengers:1
  },
  {
    pnr:'4890123456', status:'completed', statusLabel:'Completed', statusColor:'var(--muted)',
    train:'12431 Rajdhani Express', type:'Rajdhani',
    from:'NDLS', fromName:'New Delhi', to:'HWH', toName:'Howrah',
    dep:'16:55', arr:'09:55', date:'Feb 20, 2026', cls:'2A — Second AC',
    fare:'₹3,290', seats:'A1/8 LB', passengers:2
  },
  {
    pnr:'3789012345', status:'completed', statusLabel:'Completed', statusColor:'var(--muted)',
    train:'12009 Mumbai Shatabdi', type:'Shatabdi',
    from:'CSTM', fromName:'Mumbai CST', to:'PUNE', toName:'Pune',
    dep:'06:25', arr:'08:30', date:'Jan 10, 2026', cls:'CC — Chair Car',
    fare:'₹1,378', seats:'C4/56', passengers:2
  },
];

function renderBookings(filter) {
  var list = filter === 'all' ? allBookings : allBookings.filter(function(b) { return b.status === filter; });
  var container = document.getElementById('bookings-list');
  if (!list.length) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;background:#fff;border-radius:12px;border:1px solid var(--border)">'
      + '<div style="font-size:48px;margin-bottom:12px">📭</div>'
      + '<div style="font-size:16px;font-weight:700;color:var(--dark)">No bookings found</div>'
      + '<div style="color:var(--muted);font-size:13px;margin-top:4px">Try a different filter or book a new ticket</div>'
      + '</div>';
    return;
  }
  container.innerHTML = '';
  list.forEach(function(b) {
    var div = document.createElement('div');
    div.className = 'booking-card';
    div.innerHTML = '<div class="bcard-head">'
      + '<span class="pnr-num">' + b.pnr + '</span>'
      + '<span style="font-family:\'Rajdhani\',sans-serif;font-size:16px;font-weight:700;color:var(--dark)">' + b.train + '</span>'
      + '<span style="font-size:11px;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:4px">' + b.type + '</span>'
      + '<span class="badge ' + (b.status === 'upcoming' ? 'green' : 'blue') + '" style="margin-left:auto">' + b.statusLabel + '</span>'
      + '</div>'
      + '<div class="bcard-body">'
      + '<div><div style="font-family:\'Rajdhani\',sans-serif;font-size:26px;font-weight:700">' + b.dep + '</div>'
      + '<div style="font-size:13px;font-weight:700;color:var(--blue)">' + b.from + '</div>'
      + '<div style="font-size:11px;color:var(--muted)">' + b.fromName + '</div></div>'
      + '<div style="text-align:center">'
      + '<div style="display:flex;align-items:center;gap:4px;margin:4px 0">'
      + '<div style="width:6px;height:6px;border-radius:50%;background:var(--blue)"></div>'
      + '<div style="height:2px;background:var(--border);width:60px"></div>'
      + '<div style="width:6px;height:6px;border-radius:50%;background:var(--blue)"></div>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--muted)">' + b.date + '</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<div style="font-family:\'Rajdhani\',sans-serif;font-size:26px;font-weight:700">' + b.arr + '</div>'
      + '<div style="font-size:13px;font-weight:700;color:var(--blue)">' + b.to + '</div>'
      + '<div style="font-size:11px;color:var(--muted)">' + b.toName + '</div></div>'
      + '<div style="text-align:right">'
      + '<div style="font-size:12px;color:var(--muted)">Class</div>'
      + '<div style="font-size:13px;font-weight:700;color:var(--dark)">' + b.cls + '</div>'
      + '<div style="font-size:12px;color:var(--muted);margin-top:4px">Seat</div>'
      + '<div style="font-size:13px;font-weight:700;color:var(--green)">' + b.seats + '</div>'
      + '</div></div>'
      + '<div class="bcard-footer">'
      + '<div style="font-size:13px"><span style="color:var(--muted)">Fare Paid:</span> <span style="font-weight:700;font-family:\'Rajdhani\',sans-serif;font-size:16px;color:var(--blue)">' + b.fare + '</span></div>'
      + '<div style="font-size:12px;color:var(--muted);margin-left:8px">' + b.passengers + ' passenger(s)</div>'
      + '<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'
      + '<button class="bcard-action" onclick="window.location=\'pnr.html\'">📋 PNR Status</button>'
      + '<button class="bcard-action" onclick="alert(\'Downloading ticket for PNR ' + b.pnr + '\')">📥 Download Ticket</button>'
      + (b.status === 'upcoming' ? '<button class="bcard-action" onclick="alert(\'Order food for PNR ' + b.pnr + '\')">🍽️ Order Food</button>' : '')
      + (b.status === 'upcoming' ? '<button class="bcard-action danger" onclick="cancelBooking(\'' + b.pnr + '\')">✕ Cancel</button>' : '')
      + (b.status === 'completed' ? '<button class="bcard-action" onclick="alert(\'Rebook this journey\')">🔄 Rebook</button>' : '')
      + '</div></div>';
    container.appendChild(div);
  });
}

function filterBookings(filter, el) {
  document.querySelectorAll('.ftab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderBookings(filter);
}

function cancelBooking(pnr) {
  if (confirm('Are you sure you want to cancel booking PNR ' + pnr + '? Refund will be processed as per cancellation policy.')) {
    alert('Booking cancelled. Refund of approx. ₹1,647 will be credited within 5-7 working days.');
  }
}

// Initial render
renderBookings('all');
</script>
</body>
</html>
